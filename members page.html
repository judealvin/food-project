<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members Page</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #e8e2d9;
        padding: 40px;
    }

    .container {
        max-width: 1000px;
        margin: auto;
    }

    .page-title {
        text-align: center;
        margin-bottom: 25px;
        color: #2c2420;
        font-family: Georgia, serif;
        font-size: 2rem;
    }

    .members-card {
        background: #f5f1ec;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #3d3530;
        color: #f5f1ec;
    }

    th,
    td {
        padding: 14px 16px;
        text-align: left;
    }

    th {
        font-weight: 600;
    }

    tbody tr {
        border-bottom: 1px solid #c8bfb5;
    }

    tbody tr:hover {
        background: #faf8f5;
    }

    td {
        color: #2c2420;
    }

    .role {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
    }

    .father {
        background: #d8cec3;
        color: #3d3530;
    }

    .mother {
        background: #e3d7cf;
        color: #5a4038;
    }

    .child {
        background: #ede6df;
        color: #5a4e46;
    }

    @media (max-width: 768px) {
        body {
            padding: 20px;
        }

        th,
        td {
            padding: 12px;
            font-size: 14px;
        }

        .page-title {
            font-size: 1.6rem;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1 class="page-title">Members Page</h1>

    <div class="members-card">
        <table>
            <thead>
                <tr>
                    <th>Role</th>
                    <th>Username</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td><span class="role father">Father</span></td>
                    <td></td>
                    <td></td>
                </tr>

                <tr>
                    <td><span class="role mother">Mother</span></td>
                    <td></td>
                    <td></td>
                </tr>

                <tr>
                    <td><span class="role child">Child</span></td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
